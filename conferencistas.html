<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Conferencistas — IV Congreso Ingeniería Industrial</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:#E8580A;
            --navy:#0D1F3C;
            --navy2:#162B52;
            --white:#FFFFFF;
            --bg:#F0F2F7;
            --border:#D1D8E8;
            --text:#0D1F3C;
            --muted:#6B7A99;
            --font:'Barlow',sans-serif;
            --display:'Barlow Condensed',sans-serif;
            --radius-lg:16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: var(--font); 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background: var(--navy);
            padding: 40px 20px 80px; /* Padding extra abajo para el traslape */
            text-align: center;
            color: var(--white);
        }

        .logo-container img {
            height: 140px;
            width: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .info-pill {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 25px;
        }

        /* ── COUNTDOWN ── */
        .countdown-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .cd-block { text-align: center; min-width: 50px; }
        .cd-num { 
            display: block; 
            font-size: 32px; 
            font-weight: 800; 
            font-family: var(--display);
            color: var(--orange);
            line-height: 1;
        }
        .cd-unit { font-size: 11px; text-transform: uppercase; opacity: 0.6; margin-top: 4px; }
        .cd-sep { font-size: 24px; font-weight: bold; color: rgba(255,255,255,0.3); padding-bottom: 20px; }

        /* ── FORM CONTAINER ── */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 850px;
            margin: -60px auto 40px; /* Eleva la tarjeta sobre el header */
            padding: 0 15px;
        }

        .form-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(13,31,60,0.2);
            border: 1px solid var(--border);
        }

        .form-header {
            background: var(--navy2);
            color: var(--white);
            padding: 18px;
            text-align: center;
            border-bottom: 4px solid var(--orange);
        }

        .form-header h3 {
            font-family: var(--display);
            font-size: 20px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* ── IFRAME AJUSTADO ── */
        .iframe-container {
            width: 100%;
            height: 850px; /* Altura ideal para Google Forms */
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 13px;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            header { padding: 30px 15px 70px; }
            .logo-container img { height: 100px; }
            .cd-num { font-size: 24px; }
            .main-content { margin-top: -50px; }
            .iframe-container { height: 700px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://i.ibb.co/Kx7c7gDZ/01-Logo-2026-3.png" alt="Logo Industrial UMG">
        </div>

        <div class="info-pill">
            📍 Hotel Puerto Libre, Puerto Barrios <span>·</span> 25 de Abril, 2026
        </div>

        <div class="countdown-wrap">
            <div class="cd-block"><span class="cd-num" id="cd-d">00</span><div class="cd-unit">Días</div></div>
            <span class="cd-sep">:</span>
            <div class="cd-block"><span class="cd-num" id="cd-h">00</span><div class="cd-unit">Hrs</div></div>
            <span class="cd-sep">:</span>
            <div class="cd-block"><span class="cd-num" id="cd-m">00</span><div class="cd-unit">Min</div></div>
            <span class="cd-sep">:</span>
            <div class="cd-block"><span class="cd-num" id="cd-s">00</span><div class="cd-unit">Seg</div></div>
        </div>
    </header>

    <main class="main-content">
        <div class="form-card">
            <div class="form-header">
                <h3>Registro de Información de Conferencista</h3>
            </div>
            <div class="iframe-container">
                <iframe 
                    src="https://docs.google.com/forms/d/e/1FAIpQLSdOrw0Zpgv8bdhFi3AJttzEoU2urhUgbjnrKWMu04WoULQaPg/viewform?embedded=true" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0">
                    Cargando formulario…
                </iframe>
            </div>
        </div>
    </main>

    <footer>
        <strong>IV Congreso de Ingeniería Industrial</strong><br>
        Universidad Mariano Gálvez de Guatemala, Sede Puerto Barrios &copy; 2026
    </footer>

    <script>
        // Lógica del Contador para el 25 de Abril de 2026
        const eventDate = new Date('April 25, 2026 08:00:00').getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const diff = eventDate - now;

            if (diff <= 0) {
                document.querySelector('.countdown-wrap').innerHTML = "<span style='color:var(--orange); font-weight:bold;'>¡EL EVENTO HA COMENZADO!</span>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('cd-d').innerText = d < 10 ? '0'+d : d;
            document.getElementById('cd-h').innerText = h < 10 ? '0'+h : h;
            document.getElementById('cd-m').innerText = m < 10 ? '0'+m : m;
            document.getElementById('cd-s').innerText = s < 10 ? '0'+s : s;
        };

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
