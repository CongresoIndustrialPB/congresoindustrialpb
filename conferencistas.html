<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Conferencistas — IV Congreso Ingeniería Industrial</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange:#E8580A;
            --orange2:#FF8C00;
            --navy:#0D1F3C;
            --navy2:#162B52;
            --navy3:#1E3A6E;
            --gold:#F5A623;
            --white:#FFFFFF;
            --bg:#F0F2F7;
            --border:#D1D8E8;
            --text:#0D1F3C;
            --muted:#6B7A99;
            --success:#1A7F5A;
            --success-bg:#D4EDDA;
            --danger:#C0392B;
            --danger-bg:#FDECEA;
            --font:'Barlow',sans-serif;
            --display:'Barlow Condensed',sans-serif;
            --radius:10px;
            --radius-lg:16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: var(--font); 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            font-size: 15px;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            background: var(--navy);
            padding: 40px 20px;
            text-align: center;
            color: var(--white);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .logo-container img {
            height: 120px;
            width: auto;
            margin-bottom: 20px;
        }

        .info-pill {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }

        /* ── COUNTDOWN ── */
        .countdown-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
        }
        .cd-block { text-align: center; }
        .cd-num { 
            display: block; 
            font-size: 28px; 
            font-weight: 800; 
            font-family: var(--display);
            color: var(--orange);
        }
        .cd-unit { font-size: 10px; text-transform: uppercase; opacity: 0.7; }
        .cd-sep { font-size: 20px; font-weight: bold; padding-bottom: 15px; }

        /* ── FORM CONTAINER ── */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 900px;
            margin: -30px auto 40px;
            padding: 0 15px;
            z-index: 10;
        }

        .form-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .form-header {
            background: var(--navy2);
            color: var(--white);
            padding: 20px;
            text-align: center;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 150%; /* Ajuste para la altura del form */
            height: 0;
            overflow: hidden;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            .countdown-wrap { gap: 8px; }
            .cd-num { font-size: 20px; }
            .logo-container img { height: 80px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://i.ibb.co/Kx7c7gDZ/01-Logo-2026-3.png" alt="Logo Industrial UMG">
        </div>

        <div class="info-pill">
            📍 Hotel Puerto Libre, Puerto Barrios <span>·</span> 25 de Abril, 2026
        </div>

        <div class="countdown-wrap">
            <div class="cd-block"><span class="cd-num" id="cd-d">00</span><div class="cd-unit">Días</div></div>
            <span class="cd-sep">:</span>
            <div class="cd-block"><span class="cd-num" id="cd-h">00</span><div class="cd-unit">Hrs</div></div>
            <span class="cd-sep">:</span>
            <div class="cd-block"><span class="cd-num" id="cd-m">00</span><div class="cd-unit">Min</div></div>
            <span class="cd-sep">:</span>
            <div class="cd-block"><span class="cd-num" id="cd-s">00</span><div class="cd-unit">Seg</div></div>
        </div>
        
        <p style="font-size: 14px; color: rgba(255,255,255,0.7); font-family: var(--display); letter-spacing: 1px;">
            PORTAL DE REGISTRO PARA CONFERENCISTAS
        </p>
    </header>

    <main class="main-content">
        <div class="form-card">
            <div class="form-header">
                <h3>Formulario de Información</h3>
            </div>
            <div class="iframe-container">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdOrw0Zpgv8bdhFi3AJttzEoU2urhUgbjnrKWMu04WoULQaPg/viewform?usp=header">
                    Cargando…
                </iframe>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Cuarto Congreso de Ingeniería Industrial - UMG Puerto Barrios
    </footer>

    <script>
        // Countdown Logic
        const eventDate = new Date('April 25, 2026 08:00:00').getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const diff = eventDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('cd-d').innerText = d < 10 ? '0'+d : d;
            document.getElementById('cd-h').innerText = h < 10 ? '0'+h : h;
            document.getElementById('cd-m').innerText = m < 10 ? '0'+m : m;
            document.getElementById('cd-s').innerText = s < 10 ? '0'+s : s;
        };

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
