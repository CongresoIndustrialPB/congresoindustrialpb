<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IV Congreso de Ingeniería Industrial — Puerto Barrios 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #E8580A;
            --orange-light: #FF6B1A;
            --navy:   #0D1F3C;
            --navy2:  #162B52;
            --navy3:  #1E3A6E;
            --white:  #FFFFFF;
            --bg:     #F0F2F7;
            --border: #D1D8E8;
            --text:   #0D1F3C;
            --muted:  #6B7A99;
            --font:    'Barlow', sans-serif;
            --display: 'Barlow Condensed', sans-serif;
            --radius-lg: 16px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── NAVBAR ── */
        nav {
            background: var(--navy);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--orange);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .nav-inner {
            max-width: 950px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 15px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 20px;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-family: var(--display);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 3px solid transparent;
            margin-bottom: -3px;
            transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--white);
            border-bottom-color: var(--orange);
        }

        .nav-link.active {
            color: var(--orange);
            border-bottom-color: var(--orange);
        }

        .nav-icon { font-size: 16px; }

        /* ── HEADER ── */
        header {
            background: var(--navy);
            padding: 48px 20px 100px;
            text-align: center;
            color: var(--white);
            position: relative;
            overflow: hidden;
        }

        /* Geometric background decoration */
        header::after {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 300px; height: 300px;
            border: 2px solid rgba(232,88,10,0.12);
            border-radius: 50%;
            pointer-events: none;
        }

        header::before {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 65px;
            background: var(--bg);
            clip-path: ellipse(55% 100% at 50% 100%);
            z-index: 1;
        }

        .header-content { position: relative; z-index: 2; }

        .logo-container {
            margin-bottom: 22px;
            animation: fadeDown 0.7s ease both;
        }

        .logo-container img {
            height: 150px;
            width: auto;
            filter: drop-shadow(0 6px 20px rgba(0,0,0,0.4));
        }

        .info-pill {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 28px;
            letter-spacing: 0.3px;
            animation: fadeUp 0.7s 0.2s ease both;
        }

        /* ── COUNTDOWN ── */
        .countdown-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            animation: fadeUp 0.7s 0.35s ease both;
        }

        .cd-block { text-align: center; min-width: 54px; }
        .cd-num {
            display: block;
            font-size: 36px;
            font-weight: 900;
            font-family: var(--display);
            color: var(--orange);
            line-height: 1;
        }
        .cd-unit { font-size: 11px; text-transform: uppercase; opacity: 0.55; margin-top: 4px; letter-spacing: 1.5px; }
        .cd-sep  { font-size: 28px; font-weight: bold; color: rgba(255,255,255,0.2); padding-bottom: 20px; }

        /* ── MAIN ── */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 900px;
            margin: -50px auto 50px;
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        /* ── GIF CARD ── */
        .gif-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(13,31,60,0.18);
            border: 1px solid var(--border);
            animation: fadeUp 0.7s 0.5s ease both;
            margin-bottom: 28px;
        }

        .gif-card img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ── INFO CARDS ── */
        .cards-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
            animation: fadeUp 0.7s 0.65s ease both;
        }

        .info-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 22px 18px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(13,31,60,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .info-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 28px rgba(13,31,60,0.14);
        }

        .info-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        .info-card .label {
            font-family: var(--display);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .info-card .value {
            font-family: var(--display);
            font-size: 18px;
            font-weight: 800;
            color: var(--navy);
            line-height: 1.2;
        }

        .info-card .accent { color: var(--orange); }

        /* ── NAV SHORTCUT CARDS ── */
        .nav-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            animation: fadeUp 0.7s 0.8s ease both;
        }

        .nav-card {
            background: var(--navy);
            border-radius: var(--radius-lg);
            padding: 26px 18px;
            text-align: center;
            text-decoration: none;
            border: 1px solid var(--navy3);
            box-shadow: 0 4px 16px rgba(13,31,60,0.2);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .nav-card:hover {
            background: var(--navy2);
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(13,31,60,0.3);
        }

        .nav-card .nc-icon { font-size: 34px; }

        .nav-card .nc-title {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--white);
        }

        .nav-card .nc-arrow {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--orange);
            display: flex; align-items: center; justify-content: center;
            color: var(--white);
            font-size: 14px;
            margin-top: 4px;
            transition: transform 0.2s;
        }

        .nav-card:hover .nc-arrow { transform: scale(1.15); }

        /* ── FOOTER ── */
        footer {
            background: var(--navy);
            border-top: 3px solid var(--orange);
            text-align: center;
            padding: 28px 20px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            line-height: 1.8;
        }

        footer strong { color: rgba(255,255,255,0.85); }

        /* ── ANIMATIONS ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            header { padding: 35px 15px 90px; }
            .logo-container img { height: 110px; }
            .cd-num { font-size: 28px; }
            .main-content { margin-top: -45px; }

            .cards-row { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .info-card { padding: 16px 10px; }
            .info-card .icon { font-size: 24px; }
            .info-card .value { font-size: 14px; }

            .nav-cards { grid-template-columns: 1fr; gap: 12px; }
            .nav-link { padding: 12px 12px; font-size: 13px; letter-spacing: 1px; }
        }

        @media (max-width: 400px) {
            .cards-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- ── NAVBAR ── -->
    <nav>
        <div class="nav-inner">
            <a href="inicio.html"  class="nav-link active"><span class="nav-icon">🏠</span> Inicio</a>
            <a href="agenda.html" class="nav-link"><span class="nav-icon">📋</span> Agenda</a>
            <a href="evaluacion.html" class="nav-link"><span class="nav-icon">📝</span> Evaluación</a>
            <a href="diploma.html" class="nav-link"><span class="nav-icon">🎓</span> Diplomas</a>
        </div>
    </nav>

    <!-- ── HEADER ── -->
    <header>
        <div class="header-content">
            <div class="logo-container">
                <img src="https://i.ibb.co/Kx7c7gDZ/01-Logo-2026-3.png" alt="Logo IV Congreso Ingeniería Industrial">
            </div>

            <div class="info-pill">
                📍 Hotel Puerto Libre, Puerto Barrios &nbsp;·&nbsp; 25 de Abril, 2026
            </div>

            <div class="countdown-wrap">
                <div class="cd-block"><span class="cd-num" id="cd-d">00</span><div class="cd-unit">Días</div></div>
                <span class="cd-sep">:</span>
                <div class="cd-block"><span class="cd-num" id="cd-h">00</span><div class="cd-unit">Hrs</div></div>
                <span class="cd-sep">:</span>
                <div class="cd-block"><span class="cd-num" id="cd-m">00</span><div class="cd-unit">Min</div></div>
                <span class="cd-sep">:</span>
                <div class="cd-block"><span class="cd-num" id="cd-s">00</span><div class="cd-unit">Seg</div></div>
            </div>
        </div>
    </header>

    <!-- ── MAIN ── -->
    <main class="main-content">

        <!-- GIF promocional -->
        <div class="gif-card">
            <img src="https://i.ibb.co/JjkNKXY6/gif-IV-congreso.gif" alt="IV Congreso de Ingeniería Industrial 2026">
        </div>

        <!-- Patrocinadores -->
        <div class="gif-card">
            <img src="https://i.ibb.co/jvTp0jCc/10-patrocinadores-para-pag-web.png" alt="Patrocinadores IV Congreso de Ingeniería Industrial">
        </div>

    </main>

    <!-- ── FOOTER ── -->
    <footer>
        <strong>IV Congreso de Ingeniería Industrial</strong> · Universidad Mariano Gálvez · Puerto Barrios, Izabal<br>
        © M.A. Inga. Delmy Valiente
    </footer>

    <script>
        // ── Contador regresivo ──
        const eventDate = new Date('April 25, 2026 08:00:00').getTime();

        const updateCountdown = () => {
            const diff = eventDate - Date.now();

            if (diff <= 0) {
                document.querySelector('.countdown-wrap').innerHTML =
                    "<span style='color:var(--orange);font-weight:bold;font-family:var(--display);font-size:22px;letter-spacing:2px;'>¡EL EVENTO HA COMENZADO!</span>";
                return;
            }

            const pad = n => String(n).padStart(2, '0');
            document.getElementById('cd-d').textContent = pad(Math.floor(diff / 86400000));
            document.getElementById('cd-h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
            document.getElementById('cd-m').textContent = pad(Math.floor((diff % 3600000) / 60000));
            document.getElementById('cd-s').textContent = pad(Math.floor((diff % 60000) / 1000));
        };

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
